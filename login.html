<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Для своих — Вход</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #050505;
      --card: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.15);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.65);
      --input: rgba(255, 255, 255, 0.08);
      --input-focus: rgba(255, 255, 255, 0.12);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
      --success: #ffffff;
      --error: #ffb3b3;
      --warn: #ffe7a3;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.06), transparent 30%),
        linear-gradient(135deg, #000000, #111111 45%, #050505);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .bg-lines {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .line {
      position: absolute;
      width: 1px;
      height: 180%;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(255,255,255,0.12),
        transparent
      );
      animation: moveLine 8s linear infinite;
      opacity: 0.35;
    }

    .line:nth-child(1) { left: 15%; animation-delay: 0s; }
    .line:nth-child(2) { left: 35%; animation-delay: 1.5s; }
    .line:nth-child(3) { left: 60%; animation-delay: 3s; }
    .line:nth-child(4) { left: 82%; animation-delay: 4.5s; }

    @keyframes moveLine {
      0% { transform: translateY(-60%) rotate(12deg); }
      100% { transform: translateY(10%) rotate(12deg); }
    }

    .glow {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      filter: blur(90px);
      background: rgba(255,255,255,0.08);
      animation: floatGlow 8s ease-in-out infinite;
      pointer-events: none;
    }

    .glow.one {
      top: -80px;
      left: -80px;
    }

    .glow.two {
      bottom: -120px;
      right: -100px;
      animation-delay: 2s;
    }

    @keyframes floatGlow {
      0%, 100% {
        transform: translateY(0px) translateX(0px) scale(1);
      }
      50% {
        transform: translateY(20px) translateX(10px) scale(1.08);
      }
    }

    .card {
      width: 100%;
      max-width: 430px;
      margin: 20px;
      padding: 34px 28px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      position: relative;
      z-index: 2;
      animation: fadeUp 1s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .logo {
      display: inline-block;
      font-size: 14px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.1;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    input {
      width: 100%;
      border: 1px solid transparent;
      background: var(--input);
      color: var(--text);
      padding: 15px 16px;
      border-radius: 14px;
      font-size: 15px;
      outline: none;
      transition: 0.25s ease;
    }

    input::placeholder {
      color: rgba(255,255,255,0.35);
    }

    input:focus {
      background: var(--input-focus);
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-1px);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.05);
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: #ffffff;
      color: #000000;
      transition: 0.25s ease;
      margin-top: 6px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(255,255,255,0.15);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      min-height: 24px;
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .message.success {
      color: var(--success);
    }

    .message.error {
      color: var(--error);
    }

    .message.warn {
      color: var(--warn);
    }

    .switch-link {
      display: inline-block;
      margin-top: 18px;
      color: rgba(255,255,255,0.78);
      text-decoration: none;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .switch-link:hover {
      color: #ffffff;
    }

    .footer-note {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      text-align: center;
    }

    .debug-box {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    @media (max-width: 520px) {
      .card {
        padding: 26px 18px;
        border-radius: 20px;
      }

      h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-lines">
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
  </div>

  <div class="glow one"></div>
  <div class="glow two"></div>

  <div class="card">
    <div class="logo">Для своих</div>
    <h1>Вход</h1>
    <p class="subtitle">
      Войди в свой аккаунт, чтобы открыть мессенджер.
    </p>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Юсернейм</label>
        <input
          type="text"
          id="username"
          placeholder="Например: alex"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <input
          type="password"
          id="password"
          placeholder="Введи пароль"
          autocomplete="current-password"
        />
      </div>

      <button class="btn" id="loginBtn" type="submit">
        Войти
      </button>

      <div class="message" id="message"></div>

      <a class="switch-link" href="index.html">Нет аккаунта? Зарегистрироваться</a>
    </form>

    <div class="debug-box" id="debugBox">Диагностика: загрузка...</div>

    <div class="footer-note">Для своих © 2026</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB4Yd3kDph_QWajamhpo8Eq9svs-MyOMOM",
      authDomain: "dlya-svoih-5db6a.firebaseapp.com",
      projectId: "dlya-svoih-5db6a",
      storageBucket: "dlya-svoih-5db6a.firebasestorage.app",
      messagingSenderId: "974176991313",
      appId: "1:974176991313:web:245e29bc228100d0452070",
      databaseURL: "https://dlya-svoih-5db6a-default-rtdb.firebaseio.com"
    };

    const form = document.getElementById("loginForm");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const message = document.getElementById("message");
    const debugBox = document.getElementById("debugBox");

    function showMessage(text, type = "") {
      message.textContent = text;
      message.className = "message";
      if (type) {
        message.classList.add(type);
      }
    }

    function setDebug(text) {
      debugBox.textContent = text;
    }

    function normalizeUsername(username) {
      return username.trim().toLowerCase();
    }

    function describeError(error) {
      if (!error) return "неизвестная ошибка";
      if (typeof error === "string") return error;
      return error.code || error.message || JSON.stringify(error);
    }

    function browserChecks() {
      try {
        localStorage.setItem("__test__", "1");
        localStorage.removeItem("__test__");
      } catch (e) {
        showMessage("В этом браузере недоступен localStorage. Открой ссылку в обычном Chrome или Safari.", "error");
        setDebug("Провалена проверка localStorage: " + describeError(e));
        return false;
      }

      if (!window.isSecureContext) {
        showMessage("Страница открыта не в безопасном режиме. Нужен обычный браузер и HTTPS.", "error");
        setDebug("isSecureContext = false");
        return false;
      }

      if (!window.crypto || !window.crypto.subtle) {
        showMessage("В этом браузере недоступен crypto.subtle. Открой ссылку в обычном Chrome или Safari.", "error");
        setDebug("Нет window.crypto.subtle");
        return false;
      }

      if (!window.TextEncoder) {
        showMessage("В этом браузере недоступен TextEncoder. Открой ссылку в обычном Chrome или Safari.", "error");
        setDebug("Нет window.TextEncoder");
        return false;
      }

      if (!window.firebase) {
        showMessage("Firebase не загрузился. Попробуй обычный браузер или режим инкогнито.", "error");
        setDebug("window.firebase отсутствует");
        return false;
      }

      return true;
    }

    async function hashPassword(password) {
      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(byte => byte.toString(16).padStart(2, "0")).join("");
    }

    window.addEventListener("error", function (event) {
      const errText = event.message || "неизвестная ошибка скрипта";
      showMessage("Ошибка JavaScript: " + errText, "error");
      setDebug("window.onerror:\n" + errText);
    });

    window.addEventListener("unhandledrejection", function (event) {
      const errText = describeError(event.reason);
      showMessage("Необработанная ошибка: " + errText, "error");
      setDebug("unhandledrejection:\n" + errText);
    });

    let db = null;

    try {
      if (!browserChecks()) {
        throw new Error("Предварительная проверка браузера не пройдена");
      }

      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }

      db = firebase.firestore();

      setDebug(
        "Диагностика:\n" +
        "localStorage: OK\n" +
        "SecureContext: " + window.isSecureContext + "\n" +
        "crypto.subtle: OK\n" +
        "TextEncoder: OK\n" +
        "Firebase SDK: OK\n" +
        "UserAgent: " + navigator.userAgent
      );

      if (localStorage.getItem("currentUser")) {
        window.location.href = "main.html";
      }
    } catch (error) {
      showMessage("Ошибка инициализации: " + describeError(error), "error");
      setDebug(
        "Ошибка инициализации:\n" +
        describeError(error) +
        "\n\nUserAgent:\n" +
        navigator.userAgent
      );
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      if (!browserChecks()) {
        return;
      }

      if (!db) {
        showMessage("База не инициализирована. Смотри диагностику ниже.", "error");
        return;
      }

      const rawUsername = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      const username = normalizeUsername(rawUsername);

      if (!username || !password) {
        showMessage("Заполни оба поля.", "error");
        return;
      }

      try {
        loginBtn.disabled = true;
        loginBtn.textContent = "Вход...";
        showMessage("");
        setDebug("Проверка аккаунта: " + username);

        const userRef = db.collection("users").doc(username);
        const userSnap = await userRef.get();

        if (!userSnap.exists) {
          showMessage("Такого аккаунта не существует.", "error");
          setDebug("Аккаунт не найден: " + username);
          return;
        }

        const userData = userSnap.data();
        const passwordHash = await hashPassword(password);

        if (userData.passwordHash !== passwordHash) {
          showMessage("Неверный пароль.", "error");
          setDebug("Пароль не совпал для пользователя: " + username);
          return;
        }

        localStorage.setItem("currentUser", username);

        showMessage("Вход выполнен успешно.", "success");
        setDebug("Вход успешен: " + username);

        setTimeout(function () {
          window.location.href = "main.html";
        }, 800);

      } catch (error) {
        const errText = describeError(error);
        console.error(error);
        showMessage("Ошибка входа: " + errText, "error");
        setDebug(
          "Ошибка входа:\n" +
          errText +
          "\n\nUserAgent:\n" +
          navigator.userAgent
        );
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Войти";
      }
    });
  </script>
</body>
</html>
